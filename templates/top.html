<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rodo</title>
    <style>
        body { font-family: sans-serif; background-color: #f5f5f7; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h1 { color: #333; margin-bottom: 30px; text-align: center; }
        .form-section { margin-bottom: 40px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #007aff; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #005bb5; }
        .history-section { margin-top: 40px; }
        .history-title { color: #333; font-size: 14px; font-weight: bold; margin-bottom: 12px; text-transform: uppercase; }
        .room-button { display: block; width: 100%; padding: 12px; margin-bottom: 8px; background-color: #f0f0f5; color: #007aff; border: 1px solid #ddd; border-radius: 6px; text-align: center; text-decoration: none; font-weight: bold; transition: background-color 0.2s; box-sizing: border-box; }
        .room-button:hover { background-color: #e0e0e5; }
        .empty-message { text-align: center; color: #888; font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Rodo</h1>
        
        <div class="form-section">
            <form action="/login" method="POST">
                <input type="text" name="room_id" placeholder="room_id (例: project-A)" required>
                <button type="submit">Enter Room</button>
            </form>
        </div>

    </div>
</body>
</html>
