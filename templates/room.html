<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <style>
        body { font-family: sans-serif; background-color: #f5f5f7; padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 400px; }
        
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .home-button {
            text-decoration: none;
            font-size: 28px;
            transition: transform 0.2s;
        }
        .home-button:hover {
            transform: scale(1.1);
        }
        .delete-all-button {
            background-color: #ff3b30;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 2px 4px rgba(255, 59, 48, 0.3);
            transition: background-color 0.2s;
        }
        .delete-all-button:hover {
            background-color: #d70015;
        }

        .input-form { display: flex; gap: 10px; margin-bottom: 30px; }
        .input-form input[type="text"] { flex-grow: 1; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        .input-form button { padding: 12px 20px; background-color: #e5e5ea; color: #007aff; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .task-list { margin-bottom: 20px; }
        .task-item { background-color: white; padding: 15px; margin-bottom: 10px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; align-items: flex-start; font-size: 18px; cursor: pointer; transition: background-color 0.2s; }
        .task-item:hover { background-color: #f9f9fb; }
        .task-item input[type="checkbox"] { transform: scale(1.5); margin-right: 15px; margin-top: 5px; cursor: pointer; }
        .task-content { flex-grow: 1; }
        .task-title { font-weight: bold; }
        .task-details { margin-top: 10px; font-size: 14px; color: #555; background-color: #f0f0f5; padding: 10px; border-radius: 8px; border-left: 4px solid #007aff; }
        .label { font-weight: bold; color: #333; font-size: 12px; text-transform: uppercase; }
        .task-tag { color: white; font-size: 12px; font-weight: bold; padding: 2px 6px; border-radius: 4px; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header-actions">
            <a href="/" class="home-button" title="トップページへ戻る">🏠</a>
            <a href="/delete-all?room_id={{$.RoomID}}" class="delete-all-button" onclick="return confirm('本当にすべてのタスクを削除しますか？');">Delete All</a>
        </div>

        <form action="/add" method="GET" class="input-form">
            <input type="hidden" name="room_id" value="{{$.RoomID}}">
            <input type="text" name="title" placeholder="Enter a task" required>
            <input type="hidden" name="categorize" value="">
            <button type="submit">Add</button>
        </form>

        <div class="task-list">
            {{if .Tasks}}
                {{range .Tasks}}
                <div class="task-item" onclick="toggleDetails('{{.ID}}')">
                    <input type="checkbox" name="task" value="{{.ID}}" onclick="event.stopPropagation()">
                    <div class="task-content" style="width: 100%;">
                        <div class="task-title" style="display: flex; align-items: center; justify-content: space-between;">
                            <div style="display: flex; align-items: center;">
                                {{.Title}}
                                {{if .Categorize}}
                                <span class="task-tag" data-color="{{.TagColor}}">
                                    {{.Categorize}}
                                </span>
                                {{end}}
                            </div>
                            <a href="/delete?id={{.ID}}&room_id={{$.RoomID}}" onclick="event.stopPropagation(); return confirm('このタスクを削除しますか？');" style="color: #ff3b30; font-size: 14px; font-weight: bold; text-decoration: none; padding: 4px 8px; border: 1px solid #ff3b30; border-radius: 4px;">Delete</a>
                        </div>

                        <div id="details-{{.ID}}" class="task-details" style="display: none;" onclick="event.stopPropagation()">
                            <form action="/update" method="GET" style="margin-top: 10px; display: flex; flex-direction: column; gap: 10px;">
                                <input type="hidden" name="id" value="{{.ID}}">
                                <input type="hidden" name="room_id" value="{{$.RoomID}}">

                                <div style="display: flex; align-items: center; gap: 5px;">
                                    <span class="label" style="width: 50px;">TAG:</span>
                                    <input type="text" name="categorize" value="{{.Categorize}}" placeholder="タグ (例: english)" style="flex-grow: 1; padding: 5px; border: 1px solid #ccc; border-radius: 4px;">
                                </div>

                                <div style="display: flex; align-items: center; gap: 5px;">
                                    <span class="label" style="width: 50px;">MEMO:</span>
                                    <input type="text" name="memo" value="{{.Memo}}" placeholder="メモを入力..." style="flex-grow: 1; padding: 5px; border: 1px solid #ccc; border-radius: 4px;">
                                </div>

                                <button type="submit" style="align-self: flex-end; padding: 5px 15px; background-color: #007aff; color: white; border: none; border-radius: 4px; cursor: pointer;">保存</button>
                            </form>
                        </div>
                    </div>
                </div>
                {{end}}
            {{else}}
                <p style="text-align:center; color:#888;">タスクはありません</p>
            {{end}}
        </div>

        <script>
            function toggleDetails(taskId) {
                var detailsDiv = document.getElementById('details-' + taskId);
                if (detailsDiv) {
                    if (detailsDiv.style.display === 'none' || detailsDiv.style.display === '') {
                        detailsDiv.style.display = 'block';
                    } else {
                        detailsDiv.style.display = 'none';
                    }
                }
            }

            // Apply dynamic background colors to task tags
            document.querySelectorAll('.task-tag[data-color]').forEach(el => {
                el.style.backgroundColor = el.getAttribute('data-color');
            });
        </script>
    </div>
</body>
</html>
